<div class="page">
  <div class="page-header">
    <h1>Authors</h1>
    @if (isLibrarian()) {
      <a mat-flat-button color="primary" routerLink="/authors/new">
        <mat-icon>add</mat-icon>
        New author
      </a>
    }
  </div>

  @if (loading()) {
    <mat-progress-bar mode="indeterminate"></mat-progress-bar>
  }

  @if (!loading() && authors().length === 0) {
    <p>No authors yet.</p>
  }

  @if (authors().length > 0) {
    <table mat-table [dataSource]="authors()" class="full-width">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let author">{{ author.name }}</td>
      </ng-container>

      <ng-container matColumnDef="nationality">
        <th mat-header-cell *matHeaderCellDef>Nationality</th>
        <td mat-cell *matCellDef="let author">{{ author.nationality || '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="actions-col">Actions</th>
        <td mat-cell *matCellDef="let author" class="actions-col">
          <a mat-icon-button [routerLink]="['/authors', author.id, 'edit']" aria-label="Edit">
            <mat-icon>edit</mat-icon>
          </a>
          <button mat-icon-button color="warn" (click)="delete(author)" aria-label="Delete">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  }
</div>
